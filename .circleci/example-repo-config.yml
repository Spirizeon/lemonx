# Copy this file to your target repository as .circleci/config.yml
# Then set the environment variables in CircleCI project settings:
#   LEMON_WEBHOOK_URL  —  http://your-laptop-ip:3456 (or ngrok URL)
#   LEMON_WEBHOOK_SECRET —  must match the WEBHOOK_SECRET in lemon.test .env

version: 2.1

executors:
  node-executor:
    docker:
      - image: cimg/node:22.0
    working_directory: ~/project

jobs:
  ai-test-loop:
    executor: node-executor
    steps:
      - checkout

      - run:
          name: Trigger AI test-fix loop
          command: |
            echo "Sending webhook to lemon.test agent server..."
            
            PAYLOAD=$(jq -n \
              --arg repo "$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME" \
              --arg branch "$CIRCLE_BRANCH" \
              --arg commit "$CIRCLE_SHA1" \
              --arg targetDir "$(pwd)" \
              '{repoUrl: $repo, branch: $branch, commitSha: $commit, targetDir: $targetDir}')
            
            echo "Payload: $PAYLOAD"
            
            STATUS_CODE=$(curl -s -w "%{http_code}" -o /tmp/webhook_response.txt \
              -X POST "$LEMON_WEBHOOK_URL/webhook/test-and-fix" \
              -H "Content-Type: application/json" \
              -H "X-Webhook-Signature: $LEMON_WEBHOOK_SECRET" \
              -d "$PAYLOAD")
            
            echo "Status Code: $STATUS_CODE"
            echo "-------- Response --------"
            cat /tmp/webhook_response.txt || true
            echo "--------------------------"
            
            if [ "$STATUS_CODE" -ne 200 ]; then
              echo "Webhook failed with status $STATUS_CODE"
              exit 1
            fi
            
            echo "Webhook accepted. Agents are working..."

  ai-generate-tests:
    executor: node-executor
    steps:
      - checkout

      - run:
          name: Trigger AI test generation
          command: |
            PAYLOAD=$(jq -n \
              --arg repo "$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME" \
              --arg branch "$CIRCLE_BRANCH" \
              --arg commit "$CIRCLE_SHA1" \
              --arg targetDir "$(pwd)" \
              '{repoUrl: $repo, branch: $branch, commitSha: $commit, targetDir: $targetDir}')
            
            STATUS_CODE=$(curl -s -w "%{http_code}" -o /tmp/webhook_response.txt \
              -X POST "$LEMON_WEBHOOK_URL/webhook/generate-tests" \
              -H "Content-Type: application/json" \
              -H "X-Webhook-Signature: $LEMON_WEBHOOK_SECRET" \
              -d "$PAYLOAD")
            
            echo "Status Code: $STATUS_CODE"
            cat /tmp/webhook_response.txt || true
            
            if [ "$STATUS_CODE" -ne 200 ]; then
              echo "Test generation failed"
              exit 1
            fi

  ai-run-tests:
    executor: node-executor
    steps:
      - checkout

      - run:
          name: Trigger AI test execution
          command: |
            PAYLOAD=$(jq -n \
              --arg repo "$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME" \
              --arg branch "$CIRCLE_BRANCH" \
              --arg commit "$CIRCLE_SHA1" \
              --arg targetDir "$(pwd)" \
              '{repoUrl: $repo, branch: $branch, commitSha: $commit, targetDir: $targetDir}')
            
            STATUS_CODE=$(curl -s -w "%{http_code}" -o /tmp/webhook_response.txt \
              -X POST "$LEMON_WEBHOOK_URL/webhook/run-tests" \
              -H "Content-Type: application/json" \
              -H "X-Webhook-Signature: $LEMON_WEBHOOK_SECRET" \
              -d "$PAYLOAD")
            
            echo "Status Code: $STATUS_CODE"
            cat /tmp/webhook_response.txt || true
            
            if [ "$STATUS_CODE" -ne 200 ]; then
              echo "Test execution failed"
              exit 1
            fi

workflows:
  ai-test-and-fix:
    jobs:
      - ai-test-loop:
          filters:
            branches:
              ignore: main
